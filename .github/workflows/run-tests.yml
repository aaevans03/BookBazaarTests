name: Run Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_run:
    name: Build and run tests
    runs-on: ubuntu-latest
        
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Install dependencies
        run: npm ci

      - name: Write API config file
        run: |
          echo "module.exports = {
            apiUrl: '${{ secrets.MOCK_API_URL }}'
          };" > apiConfig.js
      
      - name: Run tests
        run: npm test
